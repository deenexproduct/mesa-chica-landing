<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#ece9fb"/>
    </linearGradient>
    <radialGradient id="orb" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#695EDE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#695EDE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Pill -->
  <g transform="translate(80, 100)">
    <rect width="220" height="36" rx="18" fill="#695EDE" fill-opacity="0.1" stroke="#695EDE" stroke-opacity="0.2"/>
    <circle cx="20" cy="18" r="3" fill="#695EDE"/>
    <text x="34" y="23" font-family="Inter, sans-serif" font-size="12" font-weight="700"
          letter-spacing="2" fill="#695EDE">CÓRDOBA · 16.05.2026</text>
  </g>

  <!-- Headline -->
  <text x="80" y="280" font-family="DM Sans, system-ui, sans-serif" font-size="160"
        font-weight="800" letter-spacing="-6" fill="#1B1B1B">Mesa</text>
  <text x="80" y="430" font-family="DM Sans, system-ui, sans-serif" font-size="160"
        font-weight="300" font-style="italic" letter-spacing="-6" fill="#695EDE">Chica.</text>

  <!-- Subline -->
  <text x="80" y="500" font-family="Inter, sans-serif" font-size="26" font-weight="500"
        fill="#475569">Tres founders. Tres canales. Una mesa de 30.</text>

  <!-- Footer organizers -->
  <text x="80" y="570" font-family="Inter, sans-serif" font-size="13" font-weight="700"
        letter-spacing="3" fill="#94a3b8">ORGANIZAN</text>
  <text x="80" y="600" font-family="DM Sans, system-ui, sans-serif" font-size="22"
        font-weight="800" fill="#1B1B1B">
    Deenex <tspan fill="#cbd5e1" dx="8">·</tspan><tspan dx="8">Puni</tspan>
    <tspan fill="#cbd5e1" dx="8">·</tspan><tspan dx="8">Pimentón</tspan>
  </text>

  <!-- Right side decorative -->
  <g transform="translate(1050, 180)" opacity="0.85">
    <rect width="80" height="80" rx="20" fill="#695EDE"/>
    <text x="40" y="60" text-anchor="middle" font-family="DM Sans, sans-serif"
          font-size="56" font-weight="800" font-style="italic" fill="#ffffff">M</text>
  </g>
  <text x="990" y="320" text-anchor="end" font-family="Inter, sans-serif" font-size="11"
        font-weight="700" letter-spacing="2" fill="#94a3b8">SOLO 30 LUGARES</text>
  <text x="990" y="345" text-anchor="end" font-family="Inter, sans-serif" font-size="11"
        font-weight="700" letter-spacing="2" fill="#94a3b8">SOLO POR INVITACIÓN</text>
  <text x="990" y="370" text-anchor="end" font-family="Inter, sans-serif" font-size="11"
        font-weight="700" letter-spacing="2" fill="#695EDE">#MESACHICA</text>
</svg>
