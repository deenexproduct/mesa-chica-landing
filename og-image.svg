<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#ece9fb"/>
    </linearGradient>
    <radialGradient id="orb" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#695EDE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#695EDE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Pill -->
  <g transform="translate(72, 72)">
    <rect width="270" height="36" rx="18" fill="#695EDE" fill-opacity="0.1" stroke="#695EDE" stroke-opacity="0.25"/>
    <circle cx="20" cy="18" r="3" fill="#695EDE"/>
    <text x="34" y="23" font-family="Inter, sans-serif" font-size="12" font-weight="700"
          letter-spacing="2" fill="#695EDE">SÁBADO 16.05.2026 · CÓRDOBA</text>
  </g>

  <!-- Headline (3 lines) -->
  <text x="72" y="200" font-family="DM Sans, system-ui, sans-serif" font-size="78"
        font-weight="800" letter-spacing="-3" fill="#1B1B1B">Cómo</text>

  <text x="72" y="290" font-family="DM Sans, system-ui, sans-serif" font-size="78"
        font-weight="800" letter-spacing="-3" fill="#1B1B1B">
    <tspan font-weight="300" font-style="italic" fill="#695EDE">vender</tspan>,
    <tspan font-weight="300" font-style="italic" fill="#695EDE">mover</tspan>
    y hacer
  </text>

  <text x="72" y="380" font-family="DM Sans, system-ui, sans-serif" font-size="78"
        font-weight="300" font-style="italic" letter-spacing="-3" fill="#695EDE">
    crecer<tspan fill="#1B1B1B" font-weight="800" font-style="normal">.</tspan>
  </text>

  <!-- Subline -->
  <text x="72" y="450" font-family="Inter, sans-serif" font-size="28" font-weight="500"
        fill="#475569">Tu cadena gastronómica en 2026.</text>

  <!-- Footer organizers -->
  <text x="72" y="540" font-family="Inter, sans-serif" font-size="13" font-weight="700"
        letter-spacing="3" fill="#94a3b8">3 FOUNDERS · 1 ESCENARIO</text>
  <text x="72" y="572" font-family="DM Sans, system-ui, sans-serif" font-size="24"
        font-weight="800" fill="#1B1B1B">
    Deenex <tspan fill="#cbd5e1" dx="10">·</tspan><tspan dx="10">Puni</tspan>
    <tspan fill="#cbd5e1" dx="10">·</tspan><tspan dx="10">Pimentón</tspan>
  </text>

  <!-- Right side decorative -->
  <g transform="translate(990, 470)" opacity="0.95">
    <rect width="130" height="90" rx="14" fill="#695EDE"/>
    <text x="65" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="11"
          font-weight="700" letter-spacing="2" fill="#ffffff" fill-opacity="0.7">SOLO</text>
    <text x="65" y="68" text-anchor="middle" font-family="DM Sans, sans-serif"
          font-size="32" font-weight="800" font-style="italic" fill="#ffffff">30 marcas</text>
  </g>
</svg>
